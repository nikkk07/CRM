<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — We One Aviation Attendance</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#0d1b3e 0%,#1d306b 60%,#2a4290 100%);padding:20px}
  .login-card{background:#fff;border-radius:18px;padding:34px 30px;width:100%;max-width:400px;
    box-shadow:0 18px 50px rgba(4,10,30,.45)}
  .login-card h1{font-size:20px;margin:14px 0 4px;text-align:center}
  .login-card .sub{color:var(--mut);font-size:13.5px;text-align:center;margin-bottom:22px}
  .login-card .logo{font-size:38px;text-align:center}
  .login-card label{display:block;font-size:13px;color:var(--mut);margin:14px 0 5px}
  .login-card input{width:100%;padding:11px 12px;font-size:15px}
  .login-card button{width:100%;margin-top:22px;padding:12px;font-size:15px;font-weight:600}
  .lock-note{margin-top:18px;font-size:12.5px;color:var(--mut);text-align:center;line-height:1.5}
  .err{margin-bottom:0;margin-top:16px}
  .waking{display:none;margin-top:14px;text-align:center;font-size:13px;color:var(--acc)}
</style>
</head>
<body>
<div class="login-wrap">
  <form class="login-card" method="post" action="/login" onsubmit="document.getElementById('wk').style.display='block'">
    <div class="logo">✈️</div>
    <h1>We One Aviation</h1>
    <div class="sub">Camera Monitoring &amp; Attendance</div>

    <label>CRM Login ID</label>
    <input name="login_id" required autofocus autocomplete="username" placeholder="Your CRM login ID">

    <label>Password</label>
    <input type="password" name="password" required autocomplete="current-password" placeholder="Your CRM password">

    <button class="btn" type="submit">Sign in</button>
    <div class="waking" id="wk">Checking with the CRM… this can take up to a minute if the server is waking up.</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <div class="lock-note">🔒 Admin department only.<br>Sign in with the same ID &amp; password you use for the CRM.</div>
  </form>
</div>
</body>
</html>
